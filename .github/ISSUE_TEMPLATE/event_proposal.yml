name: Prijedlog događaja
description: Predloži javni Bitcoin-only događaj.
title: "[Događaj]: "
labels: ["event"]
body:
  - type: input
    id: city
    attributes:
      label: Grad i država
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Datum i vrijeme
      description: Koristi samo potvrđene informacije.
  - type: textarea
    id: details
    attributes:
      label: Detalji
      description: Lokacija, RSVP link i program ako su javno potvrđeni.
  - type: checkboxes
    id: policy
    attributes:
      label: Pravila
      options:
        - label: Događaj je Bitcoin-only i nije trading ili token promocija.
          required: true
