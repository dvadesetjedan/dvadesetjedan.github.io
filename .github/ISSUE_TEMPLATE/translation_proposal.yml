name: Prijedlog prijevoda
description: Predloži prijevod Bitcoin-only teksta.
title: "[Prijevod]: "
labels: ["content", "translation"]
body:
  - type: markdown
    attributes:
      value: |
        Predloži prijevod samo ako je tekst Bitcoin-only i ako postoji jasan izvor. Ako status dozvole nije poznat, označi ga kao nepoznat.
  - type: input
    id: original_url
    attributes:
      label: Originalni URL
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Autor originala
  - type: dropdown
    id: permission
    attributes:
      label: Status dopuštenja
      options:
        - potvrđeno
        - otvorena licenca
        - javna domena
        - nepoznato
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Zašto je tekst koristan regiji?
      description: Napiši kome bi prijevod pomogao i koju temu razjašnjava.
  - type: textarea
    id: notes
    attributes:
      label: Napomene
      description: Ako znaš autora, licencu, postojeći prijevod ili mogući problem s dozvolom, napiši ovdje.
