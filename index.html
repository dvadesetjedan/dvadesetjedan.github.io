    />
    <meta name="theme-color" content="#fbf6ef" />
    <script>
      ;(() => {
        try {
          const stored = localStorage.getItem("dvadesetjedan-theme")
          const dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.classList.toggle("dark", dark)
          document.documentElement.style.colorScheme = dark ? "dark" : "light"
          document.querySelector('meta[name="theme-color"]').content = dark
            ? "#19130f"
            : "#fbf6ef"
        } catch {}
      })()
    </script>

    <script>
      ;(() => {
        const hash = window.location.hash
        if (!hash.startsWith("#/")) return

        let nextPath = hash.slice(1)
        if (nextPath === "/pocetnici") nextPath = "/pocni-ovdje/"
        if (nextPath === "/eventi") nextPath = "/dogadaji/"
        if (nextPath.startsWith("/eventi/")) {
          nextPath = nextPath.replace(/^\/eventi\//, "/dogadaji/")
        }
        if (!nextPath.endsWith("/")) nextPath = `${nextPath}/`
        window.location.replace(nextPath)
      })()
    </script>
